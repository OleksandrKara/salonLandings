# Nginx reverse-proxy config for mani.akluxnails.com (AK.LUX.NAILS booking landing page).
#
# This is a snapshot of the LIVE config at /etc/nginx/sites-available/mani.akluxnails.com
# on the VPS (kept here for version control / disaster recovery). It already has
# SSL provisioned via Certbot — see DEPLOYMENT.md for how it was set up.
#
# mani_frontend below is two replicas (blue/green, see docker-compose.yml), not one — a rolling
# deploy (see .github/workflows/deploy.yml) restarts them one at a time, and
# proxy_next_upstream makes this nginx silently retry a request against the other replica if the
# one it picked is mid-restart, so mani never shows a visitor a connection error during a deploy
# (this page runs paid ads — every dropped request here is wasted ad spend).
#
# To restore from scratch on a fresh box:
#   sudo cp nginx/bot-filter.conf /etc/nginx/conf.d/bot-filter.conf   # defines $blocked_ua/$blocked_ip, used below
#   sudo cp nginx/mani.akluxnails.com.conf /etc/nginx/sites-available/mani.akluxnails.com
#   sudo ln -s /etc/nginx/sites-available/mani.akluxnails.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mani.akluxnails.com
upstream mani_frontend {
    server 127.0.0.1:3001 max_fails=1 fail_timeout=3s;
    server 127.0.0.1:3003 max_fails=1 fail_timeout=3s;
}

server {
    server_name mani.akluxnails.com;

    server_tokens off;

    # Security headers (applied to all responses, incl. errors, via `always`).
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        # See nginx/bot-filter.conf ($blocked_ua/$blocked_ip) — same known scraper tools/IP
        # found inflating akluxnails-home's visitor counts; applied here too as a precaution,
        # since mani runs paid ads and every wasted request here is wasted ad spend.
        if ($blocked_ua) { return 403; }
        if ($blocked_ip) { return 403; }

        proxy_pass http://mani_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mani.akluxnails.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mani.akluxnails.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = mani.akluxnails.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name mani.akluxnails.com;
    return 404; # managed by Certbot
}
