# Shared bot/scraper blocking for the marketing-tracked landing pages (akluxnails.com,
# mani.akluxnails.com) — kept as an identical checked-in copy in both the akluxnails-home and
# salonLandings repos (there's no shared-nginx-config repo, so this is intentional duplication for
# version control/visibility, not drift to worry about fixing).
#
# This is a snapshot of the LIVE file at /etc/nginx/conf.d/bot-filter.conf on the VPS.
# Install: sudo cp nginx/bot-filter.conf /etc/nginx/conf.d/bot-filter.conf && sudo nginx -t && sudo systemctl reload nginx
#
# Targets exact tool/scraper signatures actually observed hammering these sites (traced via
# salaryReview's marketing.visits data — see the investigation that added this file) — NOT a
# generic "bot"/"crawler"/"spider" substring match, since that would also catch legitimate search
# engine crawlers (Googlebot, Bingbot, facebookexternalhit, etc.) that akluxnails.com wants to
# stay indexable by.
map $http_user_agent $blocked_ua {
    default 0;
    "~*(^Wget|^curl/|HeadlessChrome|python-requests|Go-http-client|FlowIQLabsBot)" 1;
}

# IP(s) identified hammering akluxnails.com while spoofing a real browser's user-agent (a UA check
# alone can't catch this one) — add more here if new ones turn up.
geo $blocked_ip {
    default 0;
    103.168.67.253 1;
}
