name: CI / Deploy

# Run tests on every push and PR; deploy to the VPS only when main passes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # No test suite exists yet for this service (backend/tests/ is empty) — this at least
      # catches import-time errors (bad syntax, broken imports, Pydantic settings misconfig)
      # until real tests are added. Dummy Square credentials satisfy the required Settings fields.
      - name: Backend — install deps and import sanity-check
        working-directory: backend
        env:
          SQUARE_ACCESS_TOKEN: ci-dummy-token
          SQUARE_LOCATION_ID: ci-dummy-location
        run: |
          pip install -r requirements.txt
          python -m compileall app
          python -c "from app.main import app"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend typecheck + production build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}        # optional, defaults to 22
          APP_DIR: ${{ secrets.VPS_APP_DIR }}  # optional, defaults to ~/salonLandings
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${PORT:-22}" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -p "${PORT:-22}" "$USER@$HOST" bash -se <<EOF
            set -euo pipefail
            cd "${APP_DIR:-\$HOME/salonLandings}"
            git fetch origin main
            # Match main exactly; the gitignored .env (secrets) is untouched.
            git reset --hard origin/main
            # 'ubuntu' needs sudo for docker on this host (passwordless sudo is enabled).

            # Rolling deploy: build both shared images once, then recreate backend-blue/green and
            # frontend-blue/green one at a time (backend fully rolled out before frontend, since
            # frontend's internal nginx resolves both backend hostnames at its own startup),
            # waiting for each to report healthy before touching the next. mani runs paid ads —
            # nginx's upstream retry (see nginx/mani.akluxnails.com.conf and
            # frontend/nginx.container.conf) means a visitor never sees a dropped request even
            # while one replica is mid-restart, since its pair keeps serving throughout.
            sudo docker compose build backend-blue frontend-blue

            wait_healthy() {
              for i in \$(seq 1 30); do
                if [ "\$(sudo docker inspect -f '{{.State.Health.Status}}' "\$1" 2>/dev/null)" = "healthy" ]; then
                  echo "\$1 healthy"; return 0
                fi
                sleep 3
              done
              echo "\$1 did not become healthy in time" >&2
              return 1
            }

            sudo docker compose up -d --no-deps backend-blue
            wait_healthy mani-backend-blue

            sudo docker compose up -d --no-deps backend-green
            wait_healthy mani-backend-green

            sudo docker compose up -d --no-deps frontend-blue
            wait_healthy mani-frontend-blue

            sudo docker compose up -d --no-deps frontend-green
            wait_healthy mani-frontend-green

            sudo docker image prune -f
            sudo docker compose ps
          EOF
