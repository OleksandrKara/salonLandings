# Serves the built SPA inside the frontend container and proxies /api to the backend over the
# Docker Compose network. The VPS-level Nginx (see /nginx/mani.akluxnails.com.conf) reverse-
# proxies mani.akluxnails.com straight to one of the frontend replicas, which handles the
# frontend/backend split itself — so the whole stack is reachable through one port both in dev
# and prod.
#
# backend_api below is two replicas (blue/green, see docker-compose.yml), not one — a rolling
# deploy restarts them one at a time, and proxy_next_upstream makes this nginx silently retry an
# /api/ request against the other replica if the one it picked is mid-restart, so a booking
# request in flight during a backend deploy doesn't fail.
upstream backend_api {
    server backend-blue:8000 max_fails=1 fail_timeout=3s;
    server backend-green:8000 max_fails=1 fail_timeout=3s;
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames are safe to cache forever; index.html is not.
    location ~* \.(?:js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
