# Serves the built SPA inside the frontend container and proxies /api to the
# backend container over the Docker Compose network. The VPS-level Nginx (see
# /nginx/mani.akluxnails.com.conf) reverse-proxies mani.akluxnails.com straight
# to this single container, which handles the frontend/backend split itself —
# so the whole stack is reachable through one port both in dev and prod.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames are safe to cache forever; index.html is not.
    location ~* \.(?:js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
